<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dula Printers POS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #27ae60;
            --danger: #e74c3c;
            --light: #f4f7f6;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--light); margin: 0; }
        .hidden { display: none !important; }

        /* Login Styles */
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2c3e50, #000); color: white;
        }
        .login-card { background: white; padding: 2rem; border-radius: 10px; color: #333; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input[type="password"], input[type="text"] { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 5px; background: var(--accent); color: white; transition: 0.3s; }
        button:hover { opacity: 0.8; }

        /* Dashboard Styles */
        nav { background: var(--primary); color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .item-btn { 
            background: white; border: 1px solid #ddd; padding: 15px; border-radius: 8px; 
            text-align: center; cursor: pointer; font-size: 0.9rem; font-weight: 600;
        }
        .item-btn:hover { border-color: var(--accent); background: #f0fff4; }
        .item-price { display: block; color: var(--accent); font-size: 0.8rem; }

        /* Cart & Receipt */
        .cart-panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        
        #receipt-render { 
            background: white; padding: 20px; width: 300px; border: 1px solid #eee; 
            margin-top: 20px; font-family: monospace; 
        }

        /* Reports */
        .reports-section { padding: 20px; background: white; margin-top: 20px; border-radius: 10px; }
        .summary-boxes { display: flex; gap: 15px; margin-bottom: 20px; }
        .box { padding: 15px; border-radius: 8px; color: white; flex: 1; }
        .bg-day { background: #3498db; }
        .bg-month { background: #9b59b6; }
        .bg-year { background: #f1c40f; color: #333; }
        
        .delete-btn { background: var(--danger); font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>Dula Printers</h2>
            <p>Enter Employee PIN to Access</p>
            <input type="password" id="pin-input" placeholder="Enter PIN">
            <br>
            <button onclick="checkLogin()">Login</button>
            <p id="login-err" style="color:red; font-size: 0.8rem;"></p>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <nav>
            <h3>Dula Printers POS</h3>
            <div>
                <span id="user-display">Staff</span> | 
                <button class="delete-btn" onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="container">
            <div>
                <h4>Services & Products</h4>
                <div class="items-grid" id="items-menu">
                    </div>

                <div class="reports-section">
                    <h4>Sales Reports</h4>
                    <div class="summary-boxes">
                        <div class="box bg-day">Daily: <span id="day-total">0</span></div>
                        <div class="box bg-month">Monthly: <span id="month-total">0</span></div>
                        <div class="box bg-year">Yearly: <span id="year-total">0</span></div>
                    </div>
                    <table id="sales-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Total (Rs.)</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="sales-history"></tbody>
                    </table>
                </div>
            </div>

            <div class="cart-panel">
                <h4>Current Bill</h4>
                <table id="cart-table">
                    <thead>
                        <tr><th>Item</th><th>Qty</th><th>Sub</th></tr>
                    </thead>
                    <tbody id="cart-body"></tbody>
                </table>
                <h3 style="text-align: right;">Total: රු.<span id="cart-total">0</span></h3>
                
                <input type="text" id="cust-phone" placeholder="Customer WhatsApp (e.g. 94771234567)">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <button onclick="checkout()">Finish & Save</button>
                    <button style="background: #25D366;" onclick="shareWhatsApp()">Send WhatsApp</button>
                    <button style="background: #333;" onclick="downloadJPEG()">Download Invoice (JPEG)</button>
                    <button style="background: #95a5a6;" onclick="clearCart()">Clear Cart</button>
                </div>

                <div id="receipt-capture-area" style="position: absolute; left: -9999px;">
                    <div id="receipt-render">
                        <h2 style="text-align: center;">DULA PRINTERS</h2>
                        <p style="text-align: center; font-size: 0.8rem;">Invoice</p>
                        <hr>
                        <div id="receipt-items"></div>
                        <hr>
                        <h3 id="receipt-total-display"></h3>
                        <p style="text-align: center; font-size: 0.7rem;">Thank You! Come Again.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase Integration
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ1IbJszeK7LmrJLprR9XgeKtkBdC5ZeI",
            authDomain: "dulapos-b4724.firebaseapp.com",
            databaseURL: "https://dulapos-b4724-default-rtdb.firebaseio.com",
            projectId: "dulapos-b4724",
            storageBucket: "dulapos-b4724.firebasestorage.app",
            messagingSenderId: "30878147224",
            appId: "1:30878147224:web:c83c61339445997dd126ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const salesRef = ref(db, 'sales');

        // Products Data
        const products = [
            { name: "Color Print", price: 30 },
            { name: "B&W Print", price: 20 },
            { name: "Video Editing", price: 100 },
            { name: "AI Video Ad", price: 120 },
            { name: "Web Develop", price: 200 },
            { name: "Photocopy", price: 10 },
            { name: "Atlas Pen", price: 30 },
            { name: "Tipex", price: 40 },
            { name: "Pencil", price: 25 },
            { name: "Passport Photo", price: 100 },
            { name: "Photo Restore", price: 120 }
        ];

        let cart = [];
        const MASTER_PIN = "0199";

        // Login Logic
        window.checkLogin = () => {
            const pin = document.getElementById('pin-input').value;
            if(pin === MASTER_PIN) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-system').classList.remove('hidden');
                loadReports();
            } else {
                document.getElementById('login-err').innerText = "Invalid PIN!";
            }
        };

        window.logout = () => { location.reload(); };

        // UI Generation
        const menu = document.getElementById('items-menu');
        products.forEach(p => {
            const btn = document.createElement('div');
            btn.className = 'item-btn';
            btn.innerHTML = `${p.name} <span class="item-price">රු.${p.price}</span>`;
            btn.onclick = () => addToCart(p);
            menu.appendChild(btn);
        });

        function addToCart(product) {
            const existing = cart.find(i => i.name === product.name);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({...product, qty: 1});
            }
            renderCart();
        }

        function renderCart() {
            const body = document.getElementById('cart-body');
            const receiptItems = document.getElementById('receipt-items');
            body.innerHTML = '';
            receiptItems.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const sub = item.price * item.qty;
                total += sub;
                body.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>${sub}</td></tr>`;
                receiptItems.innerHTML += `<div style="display:flex; justify-content:space-between">
                    <span>${item.name} x${item.qty}</span><span>රු.${sub}</span>
                </div>`;
            });

            document.getElementById('cart-total').innerText = total;
            document.getElementById('receipt-total-display').innerText = `Total: රු.${total}`;
        }

        window.clearCart = () => { cart = []; renderCart(); };

        // Database & Reporting
        window.checkout = () => {
            if(cart.length === 0) return alert("Cart is empty");
            
            const saleData = {
                items: cart,
                total: parseInt(document.getElementById('cart-total').innerText),
                timestamp: Date.now(),
                dateStr: new Date().toLocaleDateString()
            };

            push(salesRef, saleData).then(() => {
                alert("Sale Saved Successfully!");
                clearCart();
            });
        };

        function loadReports() {
            onValue(salesRef, (snapshot) => {
                const data = snapshot.val();
                const historyBody = document.getElementById('sales-history');
                historyBody.innerHTML = '';
                
                let daySum = 0, monthSum = 0, yearSum = 0;
                const now = new Date();

                for(let id in data) {
                    const sale = data[id];
                    const saleDate = new Date(sale.timestamp);
                    
                    // Logic for totals
                    if(saleDate.toDateString() === now.toDateString()) daySum += sale.total;
                    if(saleDate.getMonth() === now.getMonth() && saleDate.getFullYear() === now.getFullYear()) monthSum += sale.total;
                    if(saleDate.getFullYear() === now.getFullYear()) yearSum += sale.total;

                    historyBody.innerHTML += `
                        <tr>
                            <td>${sale.dateStr}</td>
                            <td>${sale.total}</td>
                            <td><button class="delete-btn" onclick="deleteSale('${id}')">Delete</button></td>
                        </tr>
                    `;
                }
                document.getElementById('day-total').innerText = daySum;
                document.getElementById('month-total').innerText = monthSum;
                document.getElementById('year-total').innerText = yearSum;
            });
        }

        window.deleteSale = (id) => {
            if(confirm("Are you sure you want to delete this record?")) {
                remove(ref(db, 'sales/' + id));
            }
        };

        // Export Functions
        window.downloadJPEG = () => {
            const area = document.getElementById('receipt-render');
            html2canvas(area).then(canvas => {
                const link = document.createElement('a');
                link.download = `Dula_Invoice_${Date.now()}.jpg`;
                link.href = canvas.toDataURL("image/jpeg");
                link.click();
            });
        };

        window.shareWhatsApp = () => {
            const phone = document.getElementById('cust-phone').value;
            if(!phone) return alert("Enter WhatsApp Number (with country code, e.g., 947...)");
            
            let text = "*DULA PRINTERS INVOICE*%0A--------------------------%0A";
            cart.forEach(i => {
                text += `${i.name} x ${i.qty} = රු.${i.price * i.qty}%0A`;
            });
            text += `--------------------------%0A*TOTAL: රු.${document.getElementById('cart-total').innerText}*`;
            
            window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
        };

    </script>
</body>
</html>
