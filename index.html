<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dula Printers - Cloud POS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2c3e50; --secondary: #34495e; --accent: #27ae60;
            --danger: #e74c3c; --light: #f4f6f7; --text: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; color: var(--text); }
        .hidden { display: none !important; }
        
        /* Auth Screen */
        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--primary); }
        .auth-box { background: white; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        .auth-box input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .auth-box button { width: 100%; padding: 10px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .toggle-auth { color: #3498db; cursor: pointer; font-size: 14px; margin-top: 15px; display: block; }

        /* Dashboard */
        header { background: var(--primary); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .container { display: grid; grid-template-columns: 2fr 1.2fr; gap: 20px; padding: 20px; }
        
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
        .item-card { background: white; padding: 15px 5px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
        .item-card:hover { border-color: var(--accent); background: #f9fffb; }
        .item-card h4 { margin: 0; font-size: 14px; }
        .item-card p { margin: 5px 0 0 0; color: var(--accent); font-weight: bold; }

        .cart-section { background: white; padding: 20px; border-radius: 10px; height: 85vh; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .cart-table { flex-grow: 1; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { text-align: left; padding: 10px 5px; border-bottom: 1px solid #eee; }
        
        .total-area { font-size: 22px; font-weight: bold; text-align: right; margin: 15px 0; color: var(--primary); }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { padding: 10px; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--primary); grid-column: span 2; }
        .btn-wa { background: #25D366; } .btn-pdf { background: #e74c3c; }

        /* Stats */
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        .stat-card { padding: 15px; border-radius: 8px; color: white; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box" id="login-box">
            <h2>Dula Printers</h2>
            <input type="text" id="l-user" placeholder="Username">
            <input type="password" id="l-pass" placeholder="Password">
            <button onclick="login()">Login</button>
            <span class="toggle-auth" onclick="toggleAuth()">Create Account</span>
            <p id="l-err" style="color:red; font-size:12px"></p>
        </div>
        <div class="auth-box hidden" id="reg-box">
            <h2>Register Staff</h2>
            <input type="text" id="r-user" placeholder="New Username">
            <input type="password" id="r-pass" placeholder="New Password">
            <input type="password" id="r-pin" placeholder="Admin PIN (0199)">
            <button onclick="register()">Register</button>
            <span class="toggle-auth" onclick="toggleAuth()">Back to Login</span>
            <p id="r-err" style="color:red; font-size:12px"></p>
        </div>
    </div>

    <div id="main-system" class="hidden">
        <header>
            <h3>Dula Printers POS</h3>
            <div><span id="user-display"></span> | <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; cursor:pointer">Logout</button></div>
        </header>

        <div class="container">
            <div>
                <div class="items-grid" id="menu"></div>
                
                <div style="background:white; padding:20px; margin-top:20px; border-radius:10px">
                    <h4>අලෙවි වාර්තා (Real-time)</h4>
                    <div class="stats">
                        <div class="stat-card" style="background:#f1c40f; color:#333">අද: <br><b id="s-day">0</b></div>
                        <div class="stat-card" style="background:#e67e22">මාසය: <br><b id="s-month">0</b></div>
                        <div class="stat-card" style="background:#8e44ad">වසර: <br><b id="s-year">0</b></div>
                    </div>
                    <table style="margin-top:20px">
                        <thead><tr><th>Time</th><th>User</th><th>Total</th><th>Action</th></tr></thead>
                        <tbody id="history"></tbody>
                    </table>
                </div>
            </div>

            <div class="cart-section">
                <h4>නව බිල්පත</h4>
                <div class="cart-table">
                    <table>
                        <thead><tr><th>Item</th><th>Qty</th><th>Price</th><th></th></tr></thead>
                        <tbody id="cart-items"></tbody>
                    </table>
                </div>
                <div class="total-area">Total: Rs. <span id="g-total">0</span></div>
                <input type="text" id="phone" placeholder="WhatsApp (9477...)" style="width:90%; padding:8px; margin-bottom:10px">
                <div class="actions">
                    <button class="btn btn-pdf" onclick="doPDF()">PDF</button>
                    <button class="btn btn-wa" onclick="doWA()">WhatsApp</button>
                    <button class="btn btn-save" id="btn-save" onclick="saveSale()">Save to Cloud</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration (ඔබ ලබාදුන් විස්තර)
        const firebaseConfig = {
            apiKey: "AIzaSyDQ1IbJszeK7LmrJLprR9XgeKtkBdC5ZeI",
            authDomain: "dulapos-b4724.firebaseapp.com",
            databaseURL: "https://dulapos-b4724-default-rtdb.firebaseio.com",
            projectId: "dulapos-b4724",
            storageBucket: "dulapos-b4724.firebasestorage.app",
            messagingSenderId: "30878147224",
            appId: "1:30878147224:web:c83c61339445997dd126ed"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        const ADMIN_PIN = "0199";
        let cart = [], users = [], sales = [], currentUser = "";

        const products = [
            { id: 1, n: "Color Print", p: 30 }, { id: 2, n: "Black & White", p: 20 },
            { id: 3, n: "Video Editing", p: 100 }, { id: 4, n: "AI Video Ad", p: 120 },
            { id: 5, n: "Web Developing", p: 200 }, { id: 6, n: "Photo Copy", p: 10 },
            { id: 7, n: "Atlas Pen", p: 30 }, { id: 8, n: "Tipex", p: 40 },
            { id: 9, n: "Pencil", p: 25 }, { id: 10, n: "Passport Edit", p: 100 },
            { id: 11, n: "Photo Restore", p: 120 }
        ];

        // Auth Logic
        window.toggleAuth = () => {
            document.getElementById('login-box').classList.toggle('hidden');
            document.getElementById('reg-box').classList.toggle('hidden');
        };

        window.register = async () => {
            const u = document.getElementById('r-user').value, p = document.getElementById('r-pass').value, pin = document.getElementById('r-pin').value;
            if(pin !== ADMIN_PIN) return document.getElementById('r-err').innerText = "Wrong Admin PIN!";
            await addDoc(collection(db, "users"), { u, p });
            alert("Account Created!"); toggleAuth();
        };

        window.login = () => {
            const u = document.getElementById('l-user').value, p = document.getElementById('l-pass').value;
            const found = users.find(x => x.u === u && x.p === p);
            if(found || (u === 'admin' && p === '0199')) {
                currentUser = u;
                document.getElementById('auth-screen').className = 'hidden';
                document.getElementById('main-system').className = '';
                document.getElementById('user-display').innerText = u;
                renderMenu();
            } else document.getElementById('l-err').innerText = "Invalid Credentials!";
        };

        // Database Sync
        onSnapshot(collection(db, "users"), s => { users = s.docs.map(d => d.data()); });
        onSnapshot(query(collection(db, "sales"), orderBy("t", "desc")), s => {
            sales = s.docs.map(d => ({ id: d.id, ...d.data() }));
            updateStats();
        });

        // POS Logic
        function renderMenu() {
            const m = document.getElementById('menu');
            products.forEach(p => {
                m.innerHTML += `<div class="item-card" onclick="addToCart(${p.id})"><h4>${p.n}</h4><p>Rs.${p.p}</p></div>`;
            });
        }

        window.addToCart = (id) => {
            const item = products.find(p => p.id === id);
            const exist = cart.find(c => c.id === id);
            if(exist) exist.q++; else cart.push({ ...item, q: 1 });
            renderCart();
        };

        window.rem = (i) => { cart.splice(i, 1); renderCart(); };

        function renderCart() {
            const b = document.getElementById('cart-items'); b.innerHTML = '';
            let total = 0;
            cart.forEach((c, i) => {
                total += c.p * c.q;
                b.innerHTML += `<tr><td>${c.n}</td><td>${c.q}</td><td>${c.p*c.q}</td><td><button onclick="rem(${i})" style="color:red">x</button></td></tr>`;
            });
            document.getElementById('g-total').innerText = total;
        }

        window.saveSale = async () => {
            if(!cart.length) return;
            document.getElementById('btn-save').innerText = "Saving...";
            const total = cart.reduce((a, b) => a + (b.p * b.q), 0);
            await addDoc(collection(db, "sales"), { t: Date.now(), user: currentUser, total, items: cart });
            cart = []; renderCart();
            document.getElementById('btn-save').innerText = "Save to Cloud";
        };

        window.delSale = async (id) => { if(confirm("Delete this record?")) await deleteDoc(doc(db, "sales", id)); };

        function updateStats() {
            const now = new Date();
            let d=0, m=0, y=0;
            const h = document.getElementById('history'); h.innerHTML = '';
            sales.forEach(s => {
                const sd = new Date(s.t);
                if(sd.toDateString() === now.toDateString()) d += s.total;
                if(sd.getMonth() === now.getMonth()) m += s.total;
                y += s.total;
                h.innerHTML += `<tr><td>${sd.toLocaleTimeString()}</td><td>${s.user}</td><td>${s.total}</td><td><button onclick="delSale('${s.id}')">Del</button></td></tr>`;
            });
            document.getElementById('s-day').innerText = d;
            document.getElementById('s-month').innerText = m;
            document.getElementById('s-year').innerText = y;
        }

        // Output
        window.doPDF = () => {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("DULA PRINTERS - BILL", 10, 10);
            let y = 20;
            cart.forEach(c => { doc.text(`${c.n} x ${c.q} = ${c.p*c.q}`, 10, y); y+=10; });
            doc.text(`TOTAL: Rs. ${document.getElementById('g-total').innerText}`, 10, y+10);
            doc.save("bill.pdf");
        };

        window.doWA = () => {
            const p = document.getElementById('phone').value;
            let txt = "*Dula Printers Bill*%0A";
            cart.forEach(c => { txt += `${c.n} x ${c.q} = ${c.p*c.q}%0A`; });
            txt += "*Total: " + document.getElementById('g-total').innerText + "*";
            window.open(`https://wa.me/${p}?text=${txt}`);
        };
    </script>
</body>
</html>
